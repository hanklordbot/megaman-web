<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mega Man</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; margin: auto; image-rendering: pixelated; }
    #gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-family: monospace; }
    #gate h1 { color: #4488ff; font-size: 24px; margin-bottom: 24px; }
    #gate input { background: #111; border: 2px solid #4488ff; color: #fff; padding: 8px 16px; font-size: 16px; font-family: monospace; text-align: center; outline: none; }
    #gate input:focus { border-color: #88ccff; }
    #gate .error { color: #ff4444; font-size: 12px; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <div id="gate">
    <h1>MEGA MAN</h1>
    <input type="password" id="pw" placeholder="ENTER PASSWORD" autofocus />
    <div class="error" id="err"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
